name: configure aws cli
description: configure aws cli and s3 environment
inputs:
  s3_key_id:
    required: true
    description: "s3 key id"
  s3_key_secret:
    required: true
    description: "s3 key secret"
  s3_bucket:
    required: true
    description: "s3 bucket"
  s3_endpoint:
    required: true
    description: "s3 endpoint"
  s3_website_suffix:
    required: true
    description: "s3 website suffix"
  s3_region:
    required: false
    description: "s3 region"
    default: "eu-north1"
  folder_prefix:
    required: true
    description: "folder prefix"
  build_preset:
    required: true
    description: "build preset like relwithdebinfo"
  install:
    required: false
    default: "true"
    description: "install awscli"

runs:
  using: composite
  steps:
    - name: install awscli
      if: inputs.install == 'true'
      shell: bash
      run: |
        if ! command -v aws > /dev/null; then
            if [ "$(id -u)" -ne 0 ]; then
                echo "aws CLI is not installed. Non-root runners must have it preinstalled in the image."
                exit 1
            fi
            [ ! -f updated ] && apt-get -o Dpkg::Lock::Timeout=600 update
            apt-get -o Dpkg::Lock::Timeout=600 install -y --no-install-recommends curl unzip
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            ./aws/install
        fi
        aws --version
    - name: configure awscli
      shell: bash --noprofile --norc -eo pipefail -x {0}
      env:
        S3_ENDPOINT: ${{ inputs.s3_endpoint }}
        S3_BUCKET: ${{ inputs.s3_bucket }}
        S3_WEBSITE_SUFFIX: ${{ inputs.s3_website_suffix }}
        S3_FOLDER_PREFIX: ${{ inputs.folder_prefix }}
        S3_KEY_ID: ${{ inputs.s3_key_id }}
        S3_SECRET_ACCESS_KEY: ${{ inputs.s3_key_secret }}
        S3_REGION: ${{ inputs.s3_region }}
        BUILD_PRESET: ${{ inputs.build_preset }}
      run: |
        CURRENT_HOME=${HOME:-}
        if [ -z "$CURRENT_HOME" ]; then
            CURRENT_USER=$(id -un)
            CURRENT_HOME=$(getent passwd "$CURRENT_USER" | cut -d: -f6)
        fi
        if [ -z "$CURRENT_HOME" ]; then
            echo "Could not resolve home directory"
            exit 1
        fi

        export GITHUB_WORKFLOW_NO_SPACES=${GITHUB_WORKFLOW// /-}

        mkdir -p "$CURRENT_HOME/.aws/"
        cat > "$CURRENT_HOME/.aws/credentials" << EOF
        [default]
        aws_access_key_id = ${S3_KEY_ID}
        aws_secret_access_key = ${S3_SECRET_ACCESS_KEY}
        EOF
        cat > "$CURRENT_HOME/.aws/config" << EOF
        [default]
        region = ${S3_REGION}
        endpoint_url=$S3_ENDPOINT
        s3 =
          max_concurrent_requests = 32
          multipart_chunksize = 32MB
          max_queue_size = 10240
        EOF

        folder="${{ runner.arch == 'X64' && 'x86-64' || runner.arch == 'ARM64' && 'arm64' || 'unknown' }}"

        # shellcheck disable=SC2195
        case "$BUILD_PRESET" in
            relwithdebinfo | release) ;;

            debug)
                folder+="-debug"
                ;;
            release-asan)
                folder+="-asan"
                ;;
            release-tsan)
                folder+="-tsan"
                ;;
            release-msan)
                folder+="-msan"
                ;;
            release-ubsan)
                folder+="-ubsan"
                ;;
            *)
                echo "Invalid preset: $BUILD_PRESET"
                exit 1
                ;;
        esac
        workflow_file="${GITHUB_WORKFLOW_REF%%@*}"
        workflow_file="${workflow_file##*/}"
        if [ -z "$workflow_file" ]; then
            workflow_file="${GITHUB_WORKFLOW_NO_SPACES}"
        fi
        {
            echo "S3_BUCKET_PATH=s3://${S3_BUCKET}/${{ github.repository }}/${GITHUB_WORKFLOW_NO_SPACES}/${{ github.run_id }}/${{ github.run_attempt || '1' }}/${S3_FOLDER_PREFIX}${folder}"
            echo "S3_URL_PREFIX=${S3_ENDPOINT}/${S3_BUCKET}/${{ github.repository }}/${GITHUB_WORKFLOW_NO_SPACES}/${{ github.run_id }}/${{ github.run_attempt || '1' }}/${S3_FOLDER_PREFIX}${folder}"
            echo "S3_WEBSITE_PREFIX=https://${S3_BUCKET}.${S3_WEBSITE_SUFFIX}/${{ github.repository }}/${GITHUB_WORKFLOW_NO_SPACES}/${{ github.run_id }}/${{ github.run_attempt || '1' }}/${S3_FOLDER_PREFIX}${folder}"
            echo "S3_REPORTS_BUCKET_PATH=s3://${S3_BUCKET}/reports/${{ github.repository }}/${workflow_file}/${{ github.run_id }}/${{ github.run_attempt || '1' }}"
            echo "S3_REPORTS_WEBSITE_PREFIX=https://${S3_BUCKET}.${S3_WEBSITE_SUFFIX}/reports/${{ github.repository }}/${workflow_file}/${{ github.run_id }}/${{ github.run_attempt || '1' }}"
            echo "S3_WEBSITE_SUFFIX=${S3_WEBSITE_SUFFIX}"
        } >> "$GITHUB_ENV"
    - name: test awscli
      shell: bash
      run: aws s3 ls
