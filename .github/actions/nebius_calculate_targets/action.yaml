name: Set build and test targets
description: >
  Computes build/test targets and matrix definitions for PR checks,
  including sanitizer handling and optional runner splitting.

author: Nebius

inputs:
  split_runners:
    description: "Split regular build/test targets into multiple runners"
    required: false
    default: "false"
  split_runners_asan:
    description: "Split ASAN build/test targets into multiple runners"
    required: false
    default: "false"
  split_runners_tsan:
    description: "Split TSAN build/test targets into multiple runners"
    required: false
    default: "false"
  split_runners_msan:
    description: "Split MSAN build/test targets into multiple runners"
    required: false
    default: "false"
  split_runners_ubsan:
    description: "Split UBSAN build/test targets into multiple runners"
    required: false
    default: "false"

outputs:
  build_target:
    description: "CSV list of build targets"
    value: ${{ steps.compute.outputs.build_target }}
  test_target:
    description: "CSV list of test targets"
    value: ${{ steps.compute.outputs.test_target }}

  build_target_asan:
    description: "CSV list of ASAN build targets"
    value: ${{ steps.compute.outputs.build_target_asan }}
  build_target_tsan:
    description: "CSV list of TSAN build targets"
    value: ${{ steps.compute.outputs.build_target_tsan }}
  build_target_msan:
    description: "CSV list of MSAN build targets"
    value: ${{ steps.compute.outputs.build_target_msan }}
  build_target_ubsan:
    description: "CSV list of UBSAN build targets"
    value: ${{ steps.compute.outputs.build_target_ubsan }}

  test_target_asan:
    description: "CSV list of ASAN test targets"
    value: ${{ steps.compute.outputs.test_target_asan }}
  test_target_tsan:
    description: "CSV list of TSAN test targets"
    value: ${{ steps.compute.outputs.test_target_tsan }}
  test_target_msan:
    description: "CSV list of MSAN test targets"
    value: ${{ steps.compute.outputs.test_target_msan }}
  test_target_ubsan:
    description: "CSV list of UBSAN test targets"
    value: ${{ steps.compute.outputs.test_target_ubsan }}

  build_matrix:
    description: "JSON array for regular build matrix"
    value: ${{ steps.compute.outputs.build_matrix }}
  test_matrix:
    description: "JSON array for regular test matrix"
    value: ${{ steps.compute.outputs.test_matrix }}

  build_matrix_asan:
    description: "JSON array for ASAN build matrix"
    value: ${{ steps.compute.outputs.build_matrix_asan }}
  build_matrix_tsan:
    description: "JSON array for TSAN build matrix"
    value: ${{ steps.compute.outputs.build_matrix_tsan }}
  build_matrix_msan:
    description: "JSON array for MSAN build matrix"
    value: ${{ steps.compute.outputs.build_matrix_msan }}
  build_matrix_ubsan:
    description: "JSON array for UBSAN build matrix"
    value: ${{ steps.compute.outputs.build_matrix_ubsan }}

  test_matrix_asan:
    description: "JSON array for ASAN test matrix"
    value: ${{ steps.compute.outputs.test_matrix_asan }}
  test_matrix_tsan:
    description: "JSON array for TSAN test matrix"
    value: ${{ steps.compute.outputs.test_matrix_tsan }}
  test_matrix_msan:
    description: "JSON array for MSAN test matrix"
    value: ${{ steps.compute.outputs.test_matrix_msan }}
  test_matrix_ubsan:
    description: "JSON array for UBSAN test matrix"
    value: ${{ steps.compute.outputs.test_matrix_ubsan }}

  matrix_include:
    description: "JSON array for including runners in regular build/test matrix"
    value: ${{ steps.compute.outputs.matrix_include }}
  matrix_include_asan:
    description: "JSON array for including runners in ASAN build/test matrix"
    value: ${{ steps.compute.outputs.matrix_include_asan }}
  matrix_include_tsan:
    description: "JSON array for including runners in TSAN build/test matrix"
    value: ${{ steps.compute.outputs.matrix_include_tsan }}
  matrix_include_msan:
    description: "JSON array for including runners in MSAN build/test matrix"
    value: ${{ steps.compute.outputs.matrix_include_msan }}
  matrix_include_ubsan:
    description: "JSON array for including runners in UBSAN build/test matrix"
    value: ${{ steps.compute.outputs.matrix_include_ubsan }}


runs:
  using: composite
  steps:
    - name: install dependencies
      shell: bash
      run: |
        pip install -r .github/scripts/requirements.txt
    - name: compute build and test targets
      id: compute
      shell: bash
      run: |
        export PYTHONPATH=$PYTHONPATH:$GITHUB_WORKSPACE/.github
        python3 -m scripts.set_build_and_test_targets
      env:
        # Component selection
        CONTAINS_BLOCKSTORE: ${{ contains(github.event.pull_request.labels.*.name, 'blockstore') && 'true' || 'false' }}
        CONTAINS_FILESTORE:  ${{ contains(github.event.pull_request.labels.*.name, 'filestore') && 'true' || 'false' }}
        CONTAINS_DISK_MANAGER: ${{ contains(github.event.pull_request.labels.*.name, 'disk_manager') && 'true' || 'false' }}
        CONTAINS_TASKS: ${{ contains(github.event.pull_request.labels.*.name, 'tasks') && 'true' || 'false' }}
        CONTAINS_STORAGE: ${{ contains(github.event.pull_request.labels.*.name, 'storage') && 'true' || 'false' }}

        # Sanitizers
        HAS_ASAN_LABEL:  ${{ contains(github.event.pull_request.labels.*.name, 'asan') && 'true' || 'false' }}
        HAS_TSAN_LABEL:  ${{ contains(github.event.pull_request.labels.*.name, 'tsan') && 'true' || 'false' }}
        HAS_MSAN_LABEL:  ${{ contains(github.event.pull_request.labels.*.name, 'msan') && 'true' || 'false' }}
        HAS_UBSAN_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'ubsan') && 'true' || 'false' }}

        # Split runners toggle
        NEBIUS_SPLIT_RUNNERS: ${{ inputs.split_runners }}
        NEBIUS_SPLIT_RUNNERS_ASAN: ${{ inputs.split_runners_asan }}
        NEBIUS_SPLIT_RUNNERS_TSAN: ${{ inputs.split_runners_tsan }}
        NEBIUS_SPLIT_RUNNERS_MSAN: ${{ inputs.split_runners_msan }}
        NEBIUS_SPLIT_RUNNERS_UBSAN: ${{ inputs.split_runners_ubsan }}
