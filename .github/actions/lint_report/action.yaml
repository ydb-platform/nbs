name: Lint report
description: Run a lint command and publish JUnit, HTML, and markdown reports

inputs:
  title:
    required: true
    description: "Display title used in the summary table"
  tool:
    required: true
    description: "Tool parser to use: flake8, black, or command"
  command:
    required: true
    description: "Command to run"
  report_name:
    required: true
    description: "Base filename for generated reports"
  report_on_success:
    required: false
    default: "true"
    description: "Generate a passing report when the command succeeds without output"

outputs:
  exit_code:
    description: "Lint command exit code"
    value: ${{ steps.report.outputs.exit_code }}
  markdown:
    description: "Markdown summary table"
    value: ${{ steps.report.outputs.markdown }}
  html_path:
    description: "Generated HTML report path"
    value: ${{ steps.report.outputs.html_path }}
  junit_path:
    description: "Generated JUnit report path"
    value: ${{ steps.report.outputs.junit_path }}
  log_path:
    description: "Captured command log path"
    value: ${{ steps.report.outputs.log_path }}
  has_report:
    description: "Whether report files were generated"
    value: ${{ steps.report.outputs.has_report }}

runs:
  using: composite
  steps:
    - name: run lint and build report
      id: report
      shell: bash
      env:
        TITLE: ${{ inputs.title }}
        TOOL: ${{ inputs.tool }}
        COMMAND: ${{ inputs.command }}
        REPORT_NAME: ${{ inputs.report_name }}
        REPORT_ON_SUCCESS: ${{ inputs.report_on_success }}
      run: |
        set -euo pipefail

        LOG_PATH="${REPORT_NAME}.log"
        JUNIT_PATH="${REPORT_NAME}-results.xml"
        HTML_PATH="${REPORT_NAME}-report.html"

        start_time=$(date +%s)
        set +e
        bash -o pipefail -c "${COMMAND}" > "${LOG_PATH}" 2>&1
        exit_code=$?
        set -e
        end_time=$(date +%s)
        elapsed=$((end_time - start_time))

        has_output=false
        if [ -s "${LOG_PATH}" ]; then
          has_output=true
        fi

        has_report=false
        if [ "${REPORT_ON_SUCCESS}" = "true" ] || [ "${exit_code}" != "0" ] || [ "${has_output}" = "true" ]; then
          has_report=true
        fi

        summary_url_prefix=""
        log_url=""
        if [ -n "${S3_URL_PREFIX:-}" ]; then
          summary_url_prefix="${S3_URL_PREFIX}/test_reports/"
          log_url="${summary_url_prefix}${LOG_PATH}"
        fi

        markdown_out=$(mktemp)
        if [ "${has_report}" = "true" ]; then
          export PYTHONPATH="${PYTHONPATH:-}:$GITHUB_WORKSPACE/.github"
          python3 -m scripts.tests.lint_report \
            --tool "${TOOL}" \
            --title "${TITLE}" \
            --command "${COMMAND}" \
            --exit-code "${exit_code}" \
            --elapsed "${elapsed}" \
            --log "${LOG_PATH}" \
            --log-url "${log_url}" \
            --junit "${JUNIT_PATH}" \
            --html "${HTML_PATH}" \
            --summary-url-prefix "${summary_url_prefix}"

          python3 -m scripts.tests.pytest_summary \
            --title "${TITLE}" \
            "${JUNIT_PATH}" > "${markdown_out}"
        fi

        {
          echo "exit_code=${exit_code}"
          echo "html_path=${HTML_PATH}"
          echo "junit_path=${JUNIT_PATH}"
          echo "log_path=${LOG_PATH}"
          echo "has_report=${has_report}"
          echo "markdown<<__PYTHON_LINT_MARKDOWN__"
          cat "${markdown_out}"
          echo "__PYTHON_LINT_MARKDOWN__"
        } >> "$GITHUB_OUTPUT"

        if [ "${has_report}" = "true" ]; then
          {
            echo "### ${TITLE} reports"
            echo
            cat "${markdown_out}"
            echo
            if [ "${ACT:-}" = "true" ]; then
              echo "- Local act run: reports were written to ${HTML_PATH}, ${JUNIT_PATH}, and ${LOG_PATH}"
            elif [ -n "${S3_URL_PREFIX:-}" ]; then
              echo "- [${TITLE} report (s3)](${S3_URL_PREFIX}/test_reports/${HTML_PATH})"
              echo "- [${TITLE} results xml (s3)](${S3_URL_PREFIX}/test_reports/${JUNIT_PATH})"
              echo "- [${TITLE} log (s3)](${S3_URL_PREFIX}/test_reports/${LOG_PATH})"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "${has_report}" = "true" ] && [ "${ACT:-}" != "true" ] && [ -n "${S3_BUCKET_PATH:-}" ]; then
          sudo -E -H -u github aws s3 cp --acl public-read --follow-symlinks --no-progress "${HTML_PATH}" "$S3_BUCKET_PATH/test_reports/${HTML_PATH}"
          sudo -E -H -u github aws s3 cp --acl public-read --follow-symlinks --no-progress "${JUNIT_PATH}" "$S3_BUCKET_PATH/test_reports/${JUNIT_PATH}"
          sudo -E -H -u github aws s3 cp --acl public-read --follow-symlinks --no-progress "${LOG_PATH}" "$S3_BUCKET_PATH/test_reports/${LOG_PATH}"
        fi
