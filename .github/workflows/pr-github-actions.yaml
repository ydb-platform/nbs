name: Check github workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/**"
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "labeled"
  workflow_dispatch:
    inputs:
      allow_downgrade:
        description: "Allow downgrade"
        required: false
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      large_tests:
        description: "Launch large tests"
        required: false
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"

permissions:
  contents: read
  pull-requests: write
  issues: write

defaults:
  run:
    shell: bash

env:
  allow_downgrade: ${{ vars.GLOBAL_ALLOW_DOWNGRADE == 'yes' || ((github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name,
    'allow-downgrade')) || inputs.allow_downgrade == 'yes') }}
  large_tests: ${{ (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'large-tests'))  && 'true' || inputs.large_tests == 'yes' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-running-allowed:
    runs-on: [self-hosted, "self-hosted", "runner_light"]
    outputs:
      result: ${{ steps.allow-local.outputs.result || steps.check-ownership-membership.outputs.result }}
    steps:
      - name: Allow local act run
        if: ${{ env.ACT == 'true' }}
        id: allow-local
        run: echo "result=true" >> "$GITHUB_OUTPUT"

      - name: checkout workflow scripts
        uses: actions/checkout@v6
        with:
          submodules: false
          sparse-checkout: ".github"
          clean: true
          ref: ${{ github.event.pull_request.head.sha }}

      - name: disable sparse checkout (workaround for actions/checkout/issues/2249)
        if: ${{ always() }}
        run: git config core.sparseCheckout false
        continue-on-error: true

      - name: Check if running tests is allowed
        if: ${{ env.ACT != 'true' }}
        id: check-ownership-membership
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          script: |
            const checkOwnershipMembership = require('./.github/scripts/check-ownership-membership.js');
            return await checkOwnershipMembership({ github, context, core });

      - name: comment-if-waiting-on-ok
        if: env.ACT != 'true' && steps.check-ownership-membership.outputs.result == 'false' && github.event.action == 'opened'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Hi! Thank you for contributing!\nThe tests on this PR will run after a maintainer adds an `ok-to-test` label to this PR manually. Thank you for your patience!'
            });

      - name: cleanup-labels
        if: ${{ env.ACT != 'true' }}
        uses: actions/github-script@v9
        with:
          script: |
            let labelsToRemove = ['ok-to-test', 'recheck'];
            const prNumber = context.payload.pull_request.number;
            const prLabels = new Set(context.payload.pull_request.labels.map(l => l.name));
            for await (const label of labelsToRemove.filter(l => prLabels.has(l))) {
              core.info(`remove label=${label} for pr=${prNumber}`);
              try {
                const result = await github.rest.issues.removeLabel({
                  ...context.repo,
                  issue_number: prNumber,
                  name: label
                });
              } catch(error) {
                // ignore the 404 error that arises
                // when the label did not exist for the
                // organization member
                if (error.status && error.status != 404) {
                  throw error;
                }
              }
            }

  check-trigger-label:
    needs:
      - check-running-allowed
    uses: ./.github/workflows/check-test-launch-label.yaml

  set-env:
    needs:
      - check-running-allowed
    runs-on: [self-hosted, "self-hosted", "runner_light"]
    outputs:
      allow_downgrade: ${{ env.allow_downgrade == 'false' && 'no' || 'yes' }}
      large_tests: ${{ env.large_tests == 'false' && 'no' || 'yes' }}
    # we don't need anything, but otherwise github will complain
    steps:
      - name: set env
        id: set-env
        run: echo
  shell:
    needs: [set-env, check-running-allowed, check-trigger-label]
    if: needs.check-running-allowed.outputs.result == 'true' && needs.check-trigger-label.outputs.allowed == 'true'
    runs-on: [self-hosted, "self-hosted", "runner_light"]

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          sparse-checkout: ".github"
          clean: true
      - name: disable sparse checkout (workaround for actions/checkout/issues/2249)
        if: ${{ always() }}
        run: git config core.sparseCheckout false
        continue-on-error: true

      - name: set up dependencies
        run: pip install -r .github/scripts/requirements_dev.txt

      - name: install shell linters
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/packer/scripts/install-shell-linters.sh

      - name: Prepare s3
        if: ${{ env.ACT != 'true' }}
        id: s3
        uses: ./.github/actions/s3cmd
        with:
          s3_bucket: ${{ vars.POOLED_LIGHT_AWS_BUCKET }}
          s3_endpoint: ${{ vars.POOLED_LIGHT_AWS_ENDPOINT }}
          s3_website_suffix: ${{ vars.POOLED_LIGHT_AWS_WEBSITE_SUFFIX }}
          s3_key_id: ${{ secrets.POOLED_LIGHT_AWS_KEY_ID }}
          s3_key_secret: ${{ secrets.POOLED_LIGHT_AWS_SECRET_KEY }}
          folder_prefix: nebius-
          build_preset: "relwithdebinfo"
          install: false

      - name: generate shellscripts from github actions
        run: |
          python3 .github/scripts/shell_extractor.py
          find .temporary/ -type f -name "*.sh";

      - name: shellcheck for .github dir
        id: shellcheck-github
        uses: ./.github/actions/lint_report
        with:
          title: "GA Scripts shellcheck (.github)"
          tool: shellcheck
          report_name: ga-scripts-shellcheck-github
          report_on_success: "false"
          command: |
            find .github -type f -print0 |
              while IFS= read -r -d '' file; do
                case "$file" in
                  *.sh | *.bash | *.bats)
                    printf '%s\0' "$file"
                    continue
                    ;;
                esac
                read -r first_line < "$file" || true
                case "$first_line" in
                  '#!'*sh* | '#!'*bash* | '#!'*dash* | '#!'*ksh* | '#!'*zsh*)
                    printf '%s\0' "$file"
                    ;;
                esac
              done |
              xargs -0 --no-run-if-empty shellcheck -f gcc ${SHELLCHECK_OPTS:-}
        env:
          SHELLCHECK_OPTS: "-e SC2155,SC2086"

      - name: shellcheck for github actions shell scripts in .temporary dir
        id: shellcheck-temporary
        uses: ./.github/actions/lint_report
        env:
          SHELLCHECK_OPTS: "-e SC2155,SC2086"
        with:
          title: "GA Scripts shellcheck (.temporary)"
          tool: shellcheck
          report_name: ga-scripts-shellcheck-temporary
          report_on_success: "false"
          command: |
            find .temporary -type f -name "*.sh" -print0 |
              xargs -0 --no-run-if-empty shellcheck -f gcc ${SHELLCHECK_OPTS:-}

      - name: shfmt
        id: shfmt
        uses: ./.github/actions/lint_report
        with:
          title: "GA Scripts shfmt"
          tool: shfmt
          report_name: ga-scripts-shfmt
          report_on_success: "false"
          command: |
            set +e
            shfmt_diff=$(shfmt -d -i 4 -ci -kp -bn -sr .github/ 2>&1)
            shfmt_status=$?
            set -e
            if [ -n "${shfmt_diff}" ]; then
              printf '%s\n' "${shfmt_diff}"
            fi
            if [ "${shfmt_status}" != "0" ]; then
              exit "${shfmt_status}"
            fi
            if [ -n "${shfmt_diff}" ]; then
              exit 1
            fi

      - name: comment on issue
        if: ${{ env.ACT != 'true' && github.event_name == 'pull_request' && always() && (steps.shellcheck-github.outputs.has_report == 'true' || steps.shellcheck-temporary.outputs.has_report == 'true' || steps.shfmt.outputs.has_report == 'true') }}
        uses: actions/github-script@v9
        env:
          SHELLCHECK_GITHUB_HAS_REPORT: ${{ steps.shellcheck-github.outputs.has_report }}
          SHELLCHECK_TEMPORARY_HAS_REPORT: ${{ steps.shellcheck-temporary.outputs.has_report }}
          SHFMT_HAS_REPORT: ${{ steps.shfmt.outputs.has_report }}
          SHELLCHECK_GITHUB_MARKDOWN: ${{ steps.shellcheck-github.outputs.markdown }}
          SHELLCHECK_TEMPORARY_MARKDOWN: ${{ steps.shellcheck-temporary.outputs.markdown }}
          SHFMT_MARKDOWN: ${{ steps.shfmt.outputs.markdown }}
        with:
          script: |
            const s3_path = process.env.S3_URL_PREFIX;
            const links = [];
            if (process.env.SHELLCHECK_GITHUB_HAS_REPORT == 'true') {
              links.push('[GA scripts shellcheck .github report (s3)](' + s3_path + '/test_reports/ga-scripts-shellcheck-github-report.html)');
            }
            if (process.env.SHELLCHECK_TEMPORARY_HAS_REPORT == 'true') {
              links.push('[GA scripts shellcheck .temporary report (s3)](' + s3_path + '/test_reports/ga-scripts-shellcheck-temporary-report.html)');
            }
            if (process.env.SHFMT_HAS_REPORT == 'true') {
              links.push('[GA scripts shfmt report (s3)](' + s3_path + '/test_reports/ga-scripts-shfmt-report.html)');
            }
            let comment = 'status: :red_circle: ' + links.join(' ');

            if (process.env.SHELLCHECK_GITHUB_MARKDOWN) {
              comment += '\n\n' + process.env.SHELLCHECK_GITHUB_MARKDOWN;
            }
            if (process.env.SHELLCHECK_TEMPORARY_MARKDOWN) {
              comment += '\n\n' + process.env.SHELLCHECK_TEMPORARY_MARKDOWN;
            }
            if (process.env.SHFMT_MARKDOWN) {
              comment += '\n\n' + process.env.SHFMT_MARKDOWN;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })

      - name: fail on shell checks
        if: ${{ always() }}
        env:
          SHELLCHECK_GITHUB_EXIT_CODE: ${{ steps.shellcheck-github.outputs.exit_code }}
          SHELLCHECK_TEMPORARY_EXIT_CODE: ${{ steps.shellcheck-temporary.outputs.exit_code }}
          SHFMT_EXIT_CODE: ${{ steps.shfmt.outputs.exit_code }}
        run: |
          status=0
          if [ "${SHELLCHECK_GITHUB_EXIT_CODE:-1}" != "0" ]; then
            echo "::error::shellcheck .github failed"
            status=1
          fi
          if [ "${SHELLCHECK_TEMPORARY_EXIT_CODE:-1}" != "0" ]; then
            echo "::error::shellcheck .temporary failed"
            status=1
          fi
          if [ "${SHFMT_EXIT_CODE:-1}" != "0" ]; then
            echo "::error::shfmt failed"
            status=1
          fi
          exit "$status"

  python:
    needs: [set-env, check-running-allowed, check-trigger-label]
    if: needs.check-running-allowed.outputs.result == 'true' && needs.check-trigger-label.outputs.allowed == 'true'
    runs-on: [self-hosted, "self-hosted", "runner_light"]

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          sparse-checkout: ".github"
          clean: true
      - name: disable sparse checkout (workaround for actions/checkout/issues/2249)
        if: ${{ always() }}
        run: git config core.sparseCheckout false
        continue-on-error: true

      - name: Prepare s3
        if: ${{ env.ACT != 'true' }}
        id: s3
        uses: ./.github/actions/s3cmd
        with:
          s3_bucket: ${{ vars.POOLED_LIGHT_AWS_BUCKET }}
          s3_endpoint: ${{ vars.POOLED_LIGHT_AWS_ENDPOINT }}
          s3_website_suffix: ${{ vars.POOLED_LIGHT_AWS_WEBSITE_SUFFIX }}
          s3_key_id: ${{ secrets.POOLED_LIGHT_AWS_KEY_ID }}
          s3_key_secret: ${{ secrets.POOLED_LIGHT_AWS_SECRET_KEY }}
          folder_prefix: nebius-
          build_preset: "relwithdebinfo"
          install: false

      - name: set up python environment
        uses: actions/setup-python@v6.2.0
        with:
          # used in ubuntu 22.04
          python-version: "3.10"

      - name: set up dependencies
        run: |
          pip install -r .github/scripts/requirements.txt
          pip install -r .github/scripts/requirements_dev.txt

      - name: flake8
        id: flake8
        uses: ./.github/actions/lint_report
        with:
          title: "GA Scripts flake8"
          tool: flake8
          report_name: ga-scripts-flake8
          command: flake8 --max-line-length 128 --ignore Q000,D100,D101,D102,D103,D104,D105,D106,D107,D401,D205,D400,E704,W503 .github/

      - name: black
        id: black
        uses: ./.github/actions/lint_report
        with:
          title: "GA Scripts black"
          tool: black
          report_name: ga-scripts-black
          command: black --check .github/

      - name: pytest
        id: pytest
        shell: bash
        run: |
          set -x
          export PYTHONPATH="${PYTHONPATH:-}:$GITHUB_WORKSPACE/.github"
          pytest --tb=short --disable-warnings --maxfail=1 \
            --junitxml="${GITHUB_WORKSPACE}/ga-scripts-pytest-results.xml" \
            --html="${GITHUB_WORKSPACE}/ga-scripts-pytest-report.html" \
            --self-contained-html \
            .github/scripts/*_test.py \
            .github/scripts/tests

      - name: Upload pytest test results artifact
        if: ${{ env.ACT != 'true' && always() }}
        id: upload
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ga-scripts-pytest-results
          path: ga-scripts-pytest-results.xml

      - name: Upload pytest html report artifact
        if: ${{ env.ACT != 'true' && always() }}
        id: upload-html
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ga-scripts-pytest-report-html
          path: ga-scripts-pytest-report.html

      - name: upload test results to s3
        if: ${{ env.ACT != 'true' && always() }}
        run: |
          set -x
          sudo -E -H -u github aws s3 cp --acl public-read --follow-symlinks --no-progress ga-scripts-pytest-report.html "$S3_BUCKET_PATH/test_reports/ga-scripts-pytest-report.html"
          sudo -E -H -u github aws s3 cp --acl public-read --follow-symlinks --no-progress ga-scripts-pytest-results.xml "$S3_BUCKET_PATH/test_reports/ga-scripts-pytest-results.xml"

      - name: build pytest summary table
        if: ${{ always() }}
        id: pytest-summary
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH="${PYTHONPATH:-}:$GITHUB_WORKSPACE/.github"
          SUMMARY_OUT=$(mktemp)
          python3 -m scripts.tests.pytest_summary \
            --title "GA Scripts pytest" \
            ga-scripts-pytest-results.xml > "$SUMMARY_OUT"
          {
            echo "markdown<<EOF"
            cat "$SUMMARY_OUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: add test report links to summary
        if: ${{ always() }}
        shell: bash
        env:
          PYTEST_SUMMARY_MARKDOWN: ${{ steps.pytest-summary.outputs.markdown }}
        run: |
          {
            echo "### GA Scripts pytest reports"
            if [ -n "${PYTEST_SUMMARY_MARKDOWN}" ]; then
              echo
              printf '%s\n' "${PYTEST_SUMMARY_MARKDOWN}"
              echo
            fi
            if [ "${ACT}" = "true" ]; then
              echo "- Local act run: reports were written to ga-scripts-pytest-report.html and ga-scripts-pytest-results.xml"
            else
              echo "- [pytest report (s3)]($S3_URL_PREFIX/test_reports/ga-scripts-pytest-report.html)"
              echo "- [pytest results xml (s3)]($S3_URL_PREFIX/test_reports/ga-scripts-pytest-results.xml)"
              echo "- [pytest report (artifact)](${{ steps.upload-html.outputs.artifact-url }})"
              echo "- [pytest results (artifact)](${{ steps.upload.outputs.artifact-url }})"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: comment on issue
        if: ${{ env.ACT != 'true' && github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@v9
        env:
          STEP_OUTCOME: ${{ steps.pytest.outcome }}
          FLAKE8_EXIT_CODE: ${{ steps.flake8.outputs.exit_code }}
          BLACK_EXIT_CODE: ${{ steps.black.outputs.exit_code }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          HTML_ARTIFACT_URL: ${{ steps.upload-html.outputs.artifact-url }}
          FLAKE8_SUMMARY_MARKDOWN: ${{ steps.flake8.outputs.markdown }}
          BLACK_SUMMARY_MARKDOWN: ${{ steps.black.outputs.markdown }}
          PYTEST_SUMMARY_MARKDOWN: ${{ steps.pytest-summary.outputs.markdown }}
        with:
          script: |
            const outcome = process.env.STEP_OUTCOME;
            const flake8ExitCode = process.env.FLAKE8_EXIT_CODE || '1';
            const blackExitCode = process.env.BLACK_EXIT_CODE || '1';
            const success = outcome == 'success' && flake8ExitCode == '0' && blackExitCode == '0';
            const status_emoji = success ? ':green_circle:' : ':red_circle:';
            const s3_path = process.env.S3_URL_PREFIX;
            let comment =
              'status: ' + status_emoji +
              ' [GA scripts flake8 report (s3)](' + s3_path + '/test_reports/ga-scripts-flake8-report.html)' +
              ' [GA scripts black report (s3)](' + s3_path + '/test_reports/ga-scripts-black-report.html)' +
              ' [GA scripts pytest result (artifact)](' + process.env.ARTIFACT_URL + ')' +
              ' [GA scripts pytest report (artifact)](' + process.env.HTML_ARTIFACT_URL + ')' +
              ' [GA scripts pytest report (s3)](' + s3_path + '/test_reports/ga-scripts-pytest-report.html)' +
              ' [GA scripts pytest results (s3)](' + s3_path + '/test_reports/ga-scripts-pytest-results.xml)';

            if (process.env.FLAKE8_SUMMARY_MARKDOWN) {
              comment += '\n\n' + process.env.FLAKE8_SUMMARY_MARKDOWN;
            }
            if (process.env.BLACK_SUMMARY_MARKDOWN) {
              comment += '\n\n' + process.env.BLACK_SUMMARY_MARKDOWN;
            }
            if (process.env.PYTEST_SUMMARY_MARKDOWN) {
              comment += '\n\n' + process.env.PYTEST_SUMMARY_MARKDOWN;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })

      - name: fail on python checks
        if: ${{ always() }}
        env:
          FLAKE8_EXIT_CODE: ${{ steps.flake8.outputs.exit_code }}
          BLACK_EXIT_CODE: ${{ steps.black.outputs.exit_code }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
        run: |
          status=0
          if [ "${FLAKE8_EXIT_CODE:-1}" != "0" ]; then
            echo "::error::flake8 failed"
            status=1
          fi
          if [ "${BLACK_EXIT_CODE:-1}" != "0" ]; then
            echo "::error::black failed"
            status=1
          fi
          if [ "${PYTEST_OUTCOME}" != "success" ]; then
            echo "::error::pytest failed"
            status=1
          fi
          exit "$status"

  workflows:
    needs: [set-env, check-running-allowed, check-trigger-label]
    if: needs.check-running-allowed.outputs.result == 'true' && needs.check-trigger-label.outputs.allowed == 'true'
    runs-on: [self-hosted, "self-hosted", "runner_light"]
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          sparse-checkout: ".github"
          clean: true
      - name: disable sparse checkout (workaround for actions/checkout/issues/2249)
        if: ${{ always() }}
        run: git config core.sparseCheckout false
        continue-on-error: true
      - name: set up home
        shell: bash
        run: echo "HOME=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: install action-validator with asdf
        uses: asdf-vm/actions/install@v4.0.1
        with:
          tool_versions: |
            action-validator 0.8.0

      - name: Prepare s3
        id: s3
        uses: ./.github/actions/s3cmd
        with:
          s3_bucket: ${{ vars.POOLED_LIGHT_AWS_BUCKET }}
          s3_endpoint: ${{ vars.POOLED_LIGHT_AWS_ENDPOINT }}
          s3_website_suffix: ${{ vars.POOLED_LIGHT_AWS_WEBSITE_SUFFIX }}
          s3_key_id: ${{ secrets.POOLED_LIGHT_AWS_KEY_ID }}
          s3_key_secret: ${{ secrets.POOLED_LIGHT_AWS_SECRET_KEY }}
          folder_prefix: nebius-
          build_preset: "relwithdebinfo"
          install: false

      - name: check workflows syntax
        id: lint
        run: |
          set -x
          export TMP_OUT=$(mktemp)
          find .github/workflows .github/actions -type f \( -iname \*.yaml -o -iname \*.yml \) -print | while read -r path; do echo Checking $path; action-validator --verbose $path; done > $TMP_OUT

          echo "WORKFLOW_LINT=$(cat $TMP_OUT | awk -v ORS='\\n' 1)"
          cat $TMP_OUT >> "$GITHUB_STEP_SUMMARY"
          echo "WORKFLOW_LINT=$(cat $TMP_OUT | awk -v ORS='\\n' 1)" >> "$GITHUB_OUTPUT"
          echo "S3_WEBSITE_PREFIX=$TMP_OUT" | tee -a "$GITHUB_ENV" | tee -a "$GITHUB_OUTPUT"
          echo "OUTPUT_FILE=$TMP_OUT" | tee -a "$GITHUB_ENV" | tee -a "$GITHUB_OUTPUT"
          chown github:github $TMP_OUT
          chmod 644 $TMP_OUT

      - name: upload workflow lint results
        if: ${{ always() }}
        id: upload-workflow-lint-to-s3
        run: |
          set -x
          sudo -E -H -u github aws s3 cp --acl public-read --follow-symlinks --no-progress "$OUTPUT_FILE" "$S3_BUCKET_PATH/workflow_lint/workflow-lint.txt"

      - name: comment on issue
        uses: actions/github-script@v9
        if: ${{ github.event_name == 'pull_request' }}
        env:
          STEP_OUTCOME: ${{ steps.lint.outcome }}
        with:
          script: |
            const outcome = process.env.STEP_OUTCOME;
            const status_emoji = outcome == 'success' ? ':green_circle:' : ':red_circle:';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'status: ' + status_emoji + ' [workflow lint result (s3)](' + process.env.S3_URL_PREFIX + '/workflow_lint/workflow-lint.txt)'
            })
  create-build-and-test-target-var:
    needs:
      - check-trigger-label
      - check-running-allowed
    if: needs.check-running-allowed.outputs.result == 'true' && needs.check-trigger-label.outputs.allowed == 'true'
    runs-on: [self-hosted, "self-hosted", "runner_light"]
    outputs:
      matrix_include: ${{ steps.set-build-and-test-targets.outputs.matrix_include }}
      matrix_include_asan: ${{ steps.set-build-and-test-targets.outputs.matrix_include_asan }}
      matrix_include_tsan: ${{ steps.set-build-and-test-targets.outputs.matrix_include_tsan }}
      matrix_include_msan: ${{ steps.set-build-and-test-targets.outputs.matrix_include_msan }}
      matrix_include_ubsan: ${{ steps.set-build-and-test-targets.outputs.matrix_include_ubsan }}
    steps:
      - name: checkout PR
        uses: actions/checkout@v6
        if: github.event.pull_request.head.sha != ''
        with:
          submodules: false
          sparse-checkout: ".github"
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ !contains(github.event.pull_request.labels.*.name, 'rebase') && 1 || 0 }}
      - name: rebase PR
        if: ${{ github.event.pull_request.head.sha != '' && contains(github.event.pull_request.labels.*.name, 'rebase') }}
        shell: bash
        run: |
          if [ -d ".git/rebase-merge" ] || [ -d ".git/rebase-apply" ]; then
            echo "Removing stale rebase state left on runner checkout"
            rm -rf .git/rebase-merge .git/rebase-apply
          fi
          git config user.email "robot-nbs@nebius.com"
          git config user.name "Robot NBS"
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git rebase origin/${{ github.event.pull_request.base.ref }}
      - name: checkout
        uses: actions/checkout@v6
        if: github.event.pull_request.head.sha == ''
        with:
          submodules: false
          sparse-checkout: ".github"
          clean: true
      - name: disable sparse checkout (workaround for actions/checkout/issues/2249)
        if: ${{ always() }}
        run: git config core.sparseCheckout false
        continue-on-error: true
      - name: Calculate pr build and test targets matrix
        id: set-build-and-test-targets
        uses: ./.github/actions/nebius_calculate_pr_matrix
        with:
          scheduling_type: ${{ vars.NEBIUS_SCHEDULING_TYPE || 'on_demand' }}

  build_and_test:
    needs: [check-running-allowed, create-build-and-test-target-var]
    if: needs.check-running-allowed.outputs.result == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.create-build-and-test-target-var.outputs.matrix_include) }}
    name: Build and test (${{ matrix.mode }}${{ matrix.vm_name_suffix }})
    uses: ./.github/workflows/build_and_test_proxy.yaml
    with:
      mode: ${{ matrix.mode }}
      build_target: ${{ matrix.build_target }}
      test_target: ${{ matrix.test_target }}
      build_preset: ${{ matrix.build_preset }}
      test_size: ${{ contains(github.event.pull_request.labels.*.name, 'large-tests') && 'small,medium,large' || 'small' }}
      test_type: ${{ matrix.test_type }}
      vm_name_suffix: ${{ matrix.vm_name_suffix }}
      number_of_retries: ${{ matrix.number_of_retries }}
      cache_update_build: false
      cache_update_tests: false
      sleep_after_tests: ${{ contains(github.event.pull_request.labels.*.name, 'sleep') && '7200' || '1' }}
    secrets: inherit

  finalize-build-and-test-comments:
    needs: [check-running-allowed, create-build-and-test-target-var, build_and_test]
    if: ${{ always() && needs.check-running-allowed.outputs.result == 'true' && needs.create-build-and-test-target-var.outputs.matrix_include != '' }}
    runs-on: [self-hosted, "self-hosted", "runner_light"]
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          sparse-checkout: '.github'
          clean: true
      - name: disable sparse checkout (workaround for actions/checkout/issues/2249)
        if: ${{ always() }}
        run: git config core.sparseCheckout false
        continue-on-error: true
      - name: set up dependencies
        run: pip install -r .github/scripts/requirements.txt
      - name: finalize workload comments
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MATRIX_INCLUDE: ${{ needs.create-build-and-test-target-var.outputs.matrix_include }}
        run: |
          set -euo pipefail
          export PYTHONPATH="${PYTHONPATH:-}:$GITHUB_WORKSPACE/.github"
          platform_name=$(uname | tr '[:upper:]' '[:lower:]')-$(arch)
          python3 -m scripts.tests.finalize_workload_comments \
            --matrix-include "$MATRIX_INCLUDE" \
            --platform-name "$platform_name" \
            --workload-status completed
