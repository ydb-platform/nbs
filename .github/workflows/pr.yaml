    strategy: 
      fail-fast: false
      matrix: ${{ fromJson(needs.create-build-and-test-target-var.outputs.matrix_include_asan) }}
    name: Build and test (asan${{ matrix.vm_name_suffix }})
    uses: ./.github/workflows/on_demand_build_and_test.yaml
