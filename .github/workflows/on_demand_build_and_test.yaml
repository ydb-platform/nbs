name: Build and test NBS on demand

on:
  workflow_dispatch:
    inputs:
      build_target:
        type: string
        default: "cloud/blockstore/apps/,cloud/filestore/apps/,cloud/disk_manager/,cloud/tasks/,cloud/storage/"
        description: "limit build to specific target"
      test_target:
        type: string
        default: "cloud/blockstore/,cloud/filestore/,cloud/disk_manager/,cloud/tasks/,cloud/storage/"
        description: "limit test to specific target"
      build_preset:
        type: choice
        default: "relwithdebinfo"
        description: "Build preset"
        options:
          - debug
          - relwithdebinfo
          - release-asan
          - release-tsan
          - release-msan
          - release-ubsan
      cache_update_build:
        type: boolean
        default: false
        description: "Update build cache in build stage"
      cache_update_tests:
        type: boolean
        default: false
        description: "Update build cache in test stage"
      test_size:
        type: choice
        default: "small"
        description: "test size to run"
        options:
          - small
          - small,medium
          - small,medium,large
      test_type:
        type: choice
        default: "unittest"
        description: "type of tests to run"
        options:
          - unittest,clang_tidy,gtest
          - py3test,py2test,pytest,flake8,black,py2_flake8
          - go_test,gofmt
          - unittest,clang_tidy,gtest,py3test,py2test,pytest,flake8,black,py2_flake8,go_test,gofmt
      sleep_after_tests:
        type: string
        default: "0"
        description: "Amount of seconds to sleep after tests"
      number_of_retries:
        type: string
        default: "1"
        description: "Number of retries for tests"
  workflow_call:
    inputs:
      build_target:
        type: string
        default: "cloud/blockstore/apps/,cloud/filestore/apps/,cloud/disk_manager/,cloud/tasks/,cloud/storage/"
        description: "limit build to specific target"
      test_target:
        type: string
        default: "cloud/blockstore/,cloud/filestore/,cloud/disk_manager/,cloud/tasks/,cloud/storage/"
        description: "limit test to specific target"
      build_preset:
        type: string
        default: "relwithdebinfo"
      vm_name_suffix:
        type: string
        default: ""
      test_size:
        type: string
        default: "small,medium,large"
      test_type:
        type: string
        default: "unittest,clang_tidy,gtest,py3test,py2test,pytest,flake8,black,py2_flake8,go_test,gofmt"
      sleep_after_tests:
        type: string
        default: "0"
        description: "Amount of seconds to sleep after tests"
      cache_update_build:
        type: boolean
        default: false
        description: "Update build cache in build stage"
      cache_update_tests:
        type: boolean
        default: false
        description: "Update build cache in test stage"
      upload_ya_dir:
        type: string
        default: "no"
        description: "Upload ya dir to s3"
      clean_ya_dir:
        type: string
        default: "no"
        description: "Clean ya dir from image before building"
      use_network_cache:
        type: string
        default: "yes"
        description: "Use network cache"
      disk_type:
        type: string
        default: "network-ssd-nonreplicated"
        description: "Disk type for VM"
      allow_downgrade:
        type: string
        default: "no"
        description: "Allow downgrade of VM"
      number_of_retries:
        type: string
        default: "1"
        description: "Number of retries for tests"

env:
  allow_downgrade: ${{ vars.GLOBAL_ALLOW_DOWNGRADE == 'yes' || ((github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'allow-downgrade')) || inputs.allow_downgrade == 'yes') }}

jobs:
  plan:
    name: Plan split workload
    runs-on: ubuntu-latest
    outputs:
      matrix_include: ${{ steps.plan.outputs.matrix_include }}
    steps:
      - name: checkout PR
        uses: actions/checkout@v4
        if: github.event.pull_request.head.sha != ''
        with:
          submodules: false
          sparse-checkout: '.github'
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ !contains(github.event.pull_request.labels.*.name, 'rebase') && 1 || 0 }}
      - name: rebase PR
        if: ${{ github.event.pull_request.head.sha != '' && contains(github.event.pull_request.labels.*.name, 'rebase') }}
        shell: bash
        run: |
          git config user.email "robot-nbs@nebius.com"
          git config user.name "Robot NBS"
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git rebase origin/${{ github.event.pull_request.base.ref }}
      - name: checkout
        uses: actions/checkout@v4
        if: github.event.pull_request.head.sha == ''
        with:
          submodules: false
          sparse-checkout: '.github'

      - name: Build matrix_include
        id: plan
        uses: ./.github/actions/nebius_split_workload
        env:
          BUILD_TARGET: ${{ inputs.build_target }}
          TEST_TARGET:  ${{ inputs.test_target }}
          BUILD_PRESET: ${{ inputs.build_preset }}
          TEST_TYPE: ${{ inputs.test_type }}
          NUMBER_OF_RETRIES: ${{ inputs.number_of_retries }}
          NEBIUS_SPLIT_RUNNERS: ${{ vars.NEBIUS_SPLIT_RUNNERS == 'true' && 'true' || 'false' }}
          NEBIUS_SPLIT_RUNNERS_ASAN: ${{ vars.NEBIUS_SPLIT_RUNNERS_ASAN == 'true' && 'true' || 'false' }}
          NEBIUS_SPLIT_RUNNERS_TSAN: ${{ vars.NEBIUS_SPLIT_RUNNERS_TSAN == 'true' && 'true' || 'false' }}
          NEBIUS_SPLIT_RUNNERS_MSAN: ${{ vars.NEBIUS_SPLIT_RUNNERS_MSAN == 'true' && 'true' || 'false' }}
          NEBIUS_SPLIT_RUNNERS_UBSAN: ${{ vars.NEBIUS_SPLIT_RUNNERS_UBSAN == 'true' && 'true' || 'false' }}
  shard:
    name: Build and test (${{ matrix.build_preset }}${{ matrix.vm_name_suffix }})
    needs: [ plan ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix_include) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR (.github only)
        uses: actions/checkout@v4
        if: github.event.pull_request.head.sha != ''
        with:
          submodules: false
          sparse-checkout: '.github'
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ !contains(github.event.pull_request.labels.*.name, 'rebase') && 1 || 0 }}
      - name: rebase PR
        if: ${{ github.event.pull_request.head.sha != '' && contains(github.event.pull_request.labels.*.name, 'rebase') }}
        shell: bash
        run: |
          git config user.email "robot-nbs@nebius.com"
          git config user.name "Robot NBS"
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git rebase origin/${{ github.event.pull_request.base.ref }}
      - name: checkout
        uses: actions/checkout@v4
        if: github.event.pull_request.head.sha == ''
        with:
          submodules: false
          sparse-checkout: '.github'
      - name: Start runner
        id: start-runner
        if: always()
        uses: ./.github/actions/nebius_runner_create
        timeout-minutes: 60
        with:
          org: ydb-platform
          team: nbs
          repo_owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          service_account_key: ${{ secrets.POOLED_HEAVY_SA_JSON }}
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          vm_parent_id: ${{ vars.POOLED_HEAVY_PARENT_ID }}
          vm_name: ${{ github.event.pull_request.number && format('pr-{0}{1}-{2}-{3}', github.event.pull_request.number, matrix.vm_name_suffix, github.run_id, github.run_attempt) || format('run-{0}{1}-{2}', github.run_id, matrix.vm_name_suffix, github.run_attempt) }}
          vm_platform_id: ${{ vars.POOLED_HEAVY_PLATFORM_ID }}
          vm_preset: ${{ vars.POOLED_HEAVY_VM_PRESET }}
          vm_disk_type: ${{ inputs.disk_type || 'network-ssd-nonreplicated' }}
          vm_disk_size: 1023
          vm_subnet: ${{ vars.POOLED_HEAVY_SUBNET_ID }}
          vm_image: ${{ vars.POOLED_HEAVY_IMAGE_ID_2204 }}
          vm_labels: ${{ github.event.pull_request.number && format('pr={0},run={1}-{2},repo={3},owner={4},shard={5}', github.event.pull_request.number, github.run_id, github.run_attempt, github.event.repository.name, github.repository_owner, matrix.component) || format('run={0}-{1},repo={2},owner={3},shard={4}', github.run_id, github.run_attempt, github.event.repository.name, github.repository_owner, matrix.component) }}
          vm_user_passwd: ${{ secrets.VM_USER_PASSWD }}
          vm_allow_downgrade: ${{ env.allow_downgrade == 'true' && 'yes' || 'no' }}
          vm_public_ip: ${{ vars.POOLED_HEAVY_PUBLIC_IP_ENABLE == 'yes' && 'yes' || 'no' }}

      - name: Calculate threads
        id: calculate-threads
        if: always()
        uses: ./.github/actions/nebius_threads_calculator
        with:
          vm_preset: ${{ steps.start-runner.outputs.VM_PRESET }}
          tests_size: ${{ inputs.test_size }}

      - name: Build and test (YA)
        id: build-and-test
        uses: ./.github/workflows/on_hybrid_build_and_test_ya.yaml
        with:
          runner_kind: self-hosted
          runner_label: ${{ steps.start-runner.outputs.LABEL }}
          runner_instance_id: ${{ steps.start-runner.outputs.INSTANCE_ID }}
          runner_ipv4: ${{ steps.start-runner.outputs.RUNNER_LOCAL_IPV4 }}

          build_target: ${{ matrix.build_target }}
          test_target: ${{ matrix.test_target }}
          build_preset: ${{ matrix.build_preset }}

          run_build: true
          run_tests: true

          test_size: ${{ inputs.test_size }}
          test_type: ${{ matrix.test_type }}

          build_threads: ${{ steps.calculate-threads.outputs.build_threads || '60' }}
          link_threads: ${{ steps.calculate-threads.outputs.link_threads || '24' }}
          test_threads: ${{ steps.calculate-threads.outputs.test_threads || '12' }}

          sleep_after_tests: ${{ inputs.sleep_after_tests }}
          cache_update_build: ${{ inputs.cache_update_build }}
          cache_update_tests: ${{ inputs.cache_update_tests }}

          upload_ya_dir: ${{ github.event_name == 'workflow_dispatch' && 'no' || inputs.upload_ya_dir}}
          clean_ya_dir: ${{ github.event_name == 'workflow_dispatch' && 'no' || inputs.clean_ya_dir }}
          use_network_cache: ${{ github.event_name == 'workflow_dispatch' && 'yes'|| inputs.use_network_cache }}
          truncate_enabled: ${{ contains(github.event.pull_request.labels.*.name, 'disable_truncate') && 'no' || 'yes' }}
          number_of_retries: ${{ matrix.number_of_retries }}

      - name: Sleep for debugging if needed
        if: ${{ !cancelled() && inputs.sleep_after_tests && inputs.sleep_after_tests != '0' }}
        shell: bash
        run: |
          echo "sleeping ${{ inputs.sleep_after_tests }}s"
          /usr/bin/sleep ${{ inputs.sleep_after_tests }}
      - name: Decide whether to remove VM
        id: decider
        if: always()
        uses: actions/github-script@v7
        env:
          ANY_CANCELLED: ${{ contains(needs.*.result, 'cancelled') }}
          REMOVE_CANCELLED_VMS: ${{ vars.NEBIUS_REMOVE_CANCELLED_VMS }}
          AUTO_CANCEL_EVENTS: ${{ vars.AUTO_CANCEL_EVENTS || 'pull_request,pull_request_target' }}
        with:
          script: |
            const anyCancelled = (process.env.ANY_CANCELLED || '') === 'true';
            const flag = (process.env.REMOVE_CANCELLED_VMS || '').trim().toLowerCase();
            if (!anyCancelled) {
              core.info('Not cancelled → remove VM.');
              return true;
            }

            const { owner, repo } = context.repo;
            const myRun = (await github.rest.actions.getWorkflowRun({ owner, repo, run_id: context.runId })).data;

            const workflowId = myRun.workflow_id;
            const event = myRun.event; // e.g. 'pull_request', 'push', 'workflow_dispatch', 'schedule'
            const branch = myRun.head_branch || undefined; // may be undefined for e.g. 'schedule'
            const myRunNumber = myRun.run_number;
            const myUpdatedAt = new Date(myRun.updated_at).getTime();

            // Only events we consider as capable of auto-cancelling (tunable)
            const permitted = new Set((process.env.AUTO_CANCEL_EVENTS || '').split(',').map(s => s.trim()).filter(Boolean));
            const eventEligible = permitted.has(event);

            // List recent runs for the same workflow (+ same branch if present)
            const listParams = { owner, repo, workflow_id: workflowId, per_page: 50 };
            if (branch) listParams.branch = branch;
            const { data } = await github.rest.actions.listWorkflowRuns(listParams);

            // Heuristic: a newer run of same workflow+event(+branch) that started before we finished ⇒ likely concurrency auto-cancel
            const newerAuto = data.workflow_runs.some(r => {
              if (r.run_number <= myRunNumber) return false;
              if (r.event !== event) return false;
              // time sanity: created/started no later than when our run completed
              const started = new Date(r.run_started_at || r.created_at || r.updated_at).getTime();
              return started <= myUpdatedAt;
            });

            core.info(`anyCancelled=${anyCancelled} flag=${flag}`);
            core.info(`workflow_id=${workflowId} event=${event} branch=${branch ?? '∅'} myRunNumber=${myRunNumber}`);
            core.info(`eventEligible=${eventEligible} newer_auto=${newerAuto}`);

            if (eventEligible && newerAuto) {
              core.info('Detected auto-cancel (newer overlapping run of same event/workflow[/branch]) → remove VM.');
              return true;
            }

            // Manual cancel path
            if (flag === 'yes') {
              core.info("Manual cancel + REMOVE_CANCELLED_VMS=='yes' → remove VM.");
              return true;
            } else {
              core.info("Manual cancel + REMOVE_CANCELLED_VMS!='yes' → keep VM.");
              return false;
            }
      - name: Stop runner
        if: ${{ always() && steps.start-runner.outputs.INSTANCE_ID != '' && steps.decider.outputs.result == 'true' }}
        uses: ./.github/actions/nebius_runner_remove
        timeout-minutes: 60
        with:
          service_account_key: ${{ secrets.POOLED_HEAVY_SA_JSON }}
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          repo_owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          vm_parent_id: ${{ vars.POOLED_HEAVY_PARENT_ID }}
          vm_id: ${{ steps.start-runner.outputs.INSTANCE_ID }}
