syntax = "proto3";

import "cloud/filestore/public/api/protos/ping.proto";

package NCloud.NFileStore.NProtoPrivate;

option go_package = "github.com/ydb-platform/nbs/cloud/filestore/private/api/protos";

////////////////////////////////////////////////////////////////////////////////
// DrainNode

message TDrainNodeRequest
{
    bool KeepDown = 1;
}

message TDrainNodeResponse
{
}

////////////////////////////////////////////////////////////////////////////////
// ReassignTablet

message TReassignTabletRequest
{
    uint64 TabletId = 1;
    repeated uint32 Channels = 2;
}

message TReassignTabletResponse
{
}

////////////////////////////////////////////////////////////////////////////////
// ListLocalFileStores request/response.

message TListLocalFileStoresRequest
{
}

message TListLocalFileStoresResponse
{
    repeated string FileSystemIds = 1;
}

////////////////////////////////////////////////////////////////////////////////
// Toggle service state request/response

message TToggleServiceStateRequest
{
    // Desired service state.
    NProto.EServiceState DesiredServiceState = 1;
}

message TToggleServiceStateResponse
{
}

////////////////////////////////////////////////////////////////////////////////
// ConfigureUnconfirmedWriteForget request/response

message TConfigureUnconfirmedWriteForgetRequest
{
    // Number of following eligible unconfirmed three-stage writes whose commit
    // id should be left without ConfirmAddData if the write succeeds.
    uint64 RequestsToForget = 1;
}

message TConfigureUnconfirmedWriteForgetResponse
{
    uint64 RequestsToForget = 1;
}
