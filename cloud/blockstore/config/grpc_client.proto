syntax = "proto3";

package NCloud.NBlockStore.NProto;

option go_package = "github.com/ydb-platform/nbs/cloud/blockstore/config";

////////////////////////////////////////////////////////////////////////////////

message TGrpcClientConfig
{
    // Server address.
    optional string Address = 1;

    // Request timeout.
    optional uint32 RequestTimeout = 2; // in milliseconds

    // Without TLS.
    optional bool Insecure = 3;

    // SSL target name override.
    optional string SslTargetNameOverride = 4;

    // GRPC KeepAlive parameters.
    optional uint32 GrpcKeepAliveTime = 5; // ms
    optional uint32 GrpcKeepAliveTimeout = 6; // ms
    optional bool GrpcKeepAlivePermitWithoutCalls = 7;
}
