syntax = "proto2";

package config;

option go_package = "github.com/ydb-platform/nbs/cloud/disk_manager/test/remote/cmd/config";

////////////////////////////////////////////////////////////////////////////////

message TestConfig {
    required string ZoneID = 1;
    required string ImageURL = 2;
    required uint64 ImageSize = 3;
    required uint32 ImageCrc32 = 4;
    optional bool MetricsReportingEnabled = 5 [default = false];
    optional bool PeriodicRunsEnabled = 6 [default = false];
    repeated string TestsBlackList = 7;
    optional uint32 MonitoringPort = 8 [default = 10900];
}
