package filesystem_dataplane;

import "cloud/disk_manager/internal/pkg/dataplane/filesystem/scrubbing/config/config.proto";
import "cloud/disk_manager/internal/pkg/dataplane/filesystem/snapshot/config/config.proto";
import "cloud/tasks/persistence/config/config.proto";

option go_package = "github.com/ydb-platform/nbs/cloud/disk_manager/internal/pkg/dataplane/filesystem/config";

