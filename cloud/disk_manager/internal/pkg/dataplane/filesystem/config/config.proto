message FilesystemDataplaneConfig {
    required persistence.PersistenceConfig PersistenceConfig = 1;
    optional scrubbing.FilesystemScrubbingConfig ScrubbingConfig = 2;
    optional filesystem_snapshot.FilesystemSnapshotConfig SnapshotConfig = 3;
}
