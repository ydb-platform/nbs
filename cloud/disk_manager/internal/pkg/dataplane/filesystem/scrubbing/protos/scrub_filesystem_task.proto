syntax = "proto3";

package scrubbing;

import "cloud/disk_manager/internal/pkg/types/types.proto";

option go_package = "github.com/ydb-platform/nbs/cloud/disk_manager/internal/pkg/dataplane/filesystem/scrubbing/protos";

////////////////////////////////////////////////////////////////////////////////

message ScrubFilesystemRequest {
    types.Filesystem Filesystem = 1;
    string FilesystemCheckpointId = 2;
}

message ScrubFilesystemTaskState {
    bool RootNodeScheduled = 1;
}

message RegularScrubFilesystemsTaskState {
    map<string, uint64> IdempotencyKeyGenerations = 1;
    repeated string LastScheduledTaskIds = 2;
}

message RegularScrubFilesystemsMetadata {
    repeated string TaskIds = 1;
}
