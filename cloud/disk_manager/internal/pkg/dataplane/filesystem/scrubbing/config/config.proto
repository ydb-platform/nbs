syntax = "proto2";

package scrubbing;

import "cloud/disk_manager/internal/pkg/dataplane/filesystem_snapshot/filesystem_traversal/config/config.proto";

option go_package = "github.com/ydb-platform/nbs/cloud/disk_manager/internal/pkg/dataplane/filesystem/scrubbing/config";

////////////////////////////////////////////////////////////////////////////////

message FilesystemScrubbingConfig {
    optional filesystem_traversal.FilesystemTraversalConfig TraversalConfig = 1;
    // default value 0 means no limit on the client size.
    optional uint32 ListNodesMaxBytes = 2;
}
