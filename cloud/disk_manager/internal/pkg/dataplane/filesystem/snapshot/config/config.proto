syntax = "proto2";

package filesystem_snapshot;

import "cloud/disk_manager/internal/pkg/dataplane/filesystem/traversal/config/config.proto";

option go_package = "github.com/ydb-platform/nbs/cloud/disk_manager/internal/pkg/dataplane/filesystem/snapshot/config";

////////////////////////////////////////////////////////////////////////////////

message FilesystemSnapshotConfig {
    optional filesystem_traversal.FilesystemTraversalConfig TraversalConfig = 1;
    // default value 0 means no limit on the client size.
    optional uint32 ListNodesMaxBytes = 2;
    optional string NodesStorageFolder = 3 [default = "filesystem/snapshot/nodes"];
    // Hardlinks are restored after directory structure restoration. This value limits
    // how many hardlink nodes are fetched and created in one batch.
    optional uint32 RestoreHardlinksBatchSize = 4 [default = 1000];
    // Number of nodes to fetch from the storage per batch.
    optional uint32 FetchNodesFromStorageLimit = 6 [default = 1000];
    optional uint64 SnapshotDataDeletionLimit = 7 [default = 1000];
    optional string SnapshotCollectionTimeout = 8 [default = "30m"];
    optional string CollectSnapshotsTaskScheduleInterval = 9 [default = "1m"];
    optional uint32 SnapshotCollectionInflightLimit = 10 [default = 10];
}
