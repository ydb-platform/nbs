syntax = "proto3";

package filesystem_snapshot;

import "cloud/disk_manager/internal/pkg/types/types.proto";

option go_package = "github.com/ydb-platform/nbs/cloud/disk_manager/internal/pkg/dataplane/filesystem/snapshot/protos";

////////////////////////////////////////////////////////////////////////////////

message TransferFromSnapshotToFilesystemRequest {
    types.Filesystem Filesystem = 1;
    string SnapshotId = 2;
}

message TransferFromSnapshotToFilesystemTaskState {
    bool RootNodeScheduled = 1;
    int64 HardlinksRestoreOffset = 2;
}
